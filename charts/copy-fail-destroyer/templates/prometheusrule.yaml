{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "copy-fail-destroyer.name" . }}
  namespace: {{ .Values.metrics.prometheusRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "copy-fail-destroyer.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: copy-fail-destroyer
      rules:
        - alert: CopyFailVulnerable
          expr: count(cve_2026_31431_vulnerable == 1) > 0
          for: 1m
          labels:
            severity: critical
            {{- with .Values.metrics.prometheusRule.extraAlertLabelsCopyFailVulnerable }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "{{ "{{ $value }}" }} node(s) vulnerable to CVE-2026-31431 (Copy Fail)"
            description: "Kernel is vulnerable and the AF_ALG module is reachable on {{ "{{ $value }}" }} node(s). Remediation has not succeeded."

        - alert: CopyFailKernelNeedsPatching
          expr: count(cve_2026_31431_kernel_needs_patching == 1) > 0
          for: 1m
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabelsCopyFailKernelNeedsPatching }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "{{ "{{ $value }}" }} node(s) need kernel patching for CVE-2026-31431"
            description: "{{ "{{ $value }}" }} node(s) are running unpatched kernels for CVE-2026-31431. Module may be unreachable (mitigated) but the kernel should still be updated."

        - alert: CopyFailRemediationFailed
          expr: count((cve_2026_31431_module_reachable == 1) and (cve_2026_31431_remediation_applied == 0)) > 0
          for: 3m
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabelsCopyFailRemediationFailed }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "{{ "{{ $value }}" }} node(s) failed AF_ALG module remediation"
            description: "The agent failed to unload the algif_aead module on {{ "{{ $value }}" }} node(s). Manual intervention may be required."

        - alert: CopyFailAFALGModuleInUse
          expr: count(cve_2026_31431_af_alg_aead_socket_users > 0 or cve_2026_31431_af_alg_aead_refcount > 0) > 0
          for: 1m
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabelsCopyFailAFALGModuleInUse }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "{{ "{{ $value }}" }} node(s) have processes actively using the algif_aead module"
            description: "{{ "{{ $value }}" }} node(s) have active AF_ALG AEAD sockets open. Unloading the algif_aead module for remediation will disrupt those processes."
{{- end }}
